<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ uname }} - 运行记录</title>
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('../1_Minecraft-Regular.otf') format('opentype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Minecraft', monospace;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            position: relative;
            width: 1280px;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .content {
            position: relative;
            z-index: 1;
            width: 80%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .content-main {
            display: flex;
            flex: 1;
        }
        
        .stats-container {
            flex: 1;
            padding-right: 20px;
        }
        
        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            width: 200px;
            padding-left: 20px;
        }
        
        .username {
            font-size: 24px;
            color: white;
            text-align: center;
            white-space: nowrap;
            margin-bottom: 20px;
        }
        
        .skin-container {
            width: 158px;
            height: 256px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .skin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            height: 40px;
        }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            margin-right: 20px;
        }
        
        .stat-text {
            font-size: 40px;
            color: white;
            line-height: 40px;
        }
        
        .update-time {
            font-size: 24px;
            color: white;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../background.webp" alt="背景" class="background">
        <div class="content">
            <div class="content-main">
                <div class="stats-container">
                    <div class="stat-item">
                        <img src="../nether.webp" alt="下界" class="stat-icon">
                        <span class="stat-text">{{ times.nether }}</span>
                    </div>
                    <div class="stat-item">
                        <img src="../bastion.webp" alt="堡垒遗迹" class="stat-icon">
                        <span class="stat-text">{{ times.bastion }}</span>
                    </div>
                    <div class="stat-item">
                        <img src="../fortress.webp" alt="下界要塞" class="stat-icon">
                        <span class="stat-text">{{ times.fortress }}</span>
                    </div>
                    <div class="stat-item">
                        <img src="../first_portal.webp" alt="第一个传送门" class="stat-icon">
                        <span class="stat-text">{{ times.first_portal }}</span>
                    </div>
                    <div class="stat-item">
                        <img src="../stronghold.webp" alt="要塞" class="stat-icon">
                        <span class="stat-text">{{ times.stronghold }}</span>
                    </div>
                    <div class="stat-item">
                        <img src="../end.webp" alt="末地" class="stat-icon">
                        <span class="stat-text">{{ times.end }}</span>
                    </div>
                    <div class="stat-item">
                        <img src="../finish.webp" alt="完成" class="stat-icon">
                        <span class="stat-text">{{ times.finish }}</span>
                    </div>
                </div>
                
                <div class="right-section">
                    <div class="username">{{ uname }}</div>
                    <div class="skin-container">
                        <img src="https://render.crafty.gg/3d/full/{{ uname }}" alt="{{ uname }}的皮肤" class="skin-image" onerror="this.style.display='none'">
                    </div>
                </div>
            </div>
            
            <div class="update-time">{{ update_time }}</div>
        </div>
    </div>
</body>
</html>
