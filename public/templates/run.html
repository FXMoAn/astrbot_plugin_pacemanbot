<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ uname }} - 运行记录</title>
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('{{ font_uri | safe }}') format('opentype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            font-family: 'Minecraft', monospace;
            color: #fff;
            background: #111;
        }

        .container {
            position: relative;
            width: 1280px;
            height: 720px;
            overflow: hidden;
        }

        .background {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
            transform: scale(1.03);
        }

        .shade {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(8, 10, 14, 0.54) 0%, rgba(8, 10, 14, 0.36) 55%, rgba(8, 10, 14, 0.16) 100%),
                linear-gradient(0deg, rgba(8, 10, 14, 0.24) 0%, transparent 32%);
        }

        .content {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 600px 1fr;
            grid-template-rows: 1fr 58px;
            gap: 32px;
            width: 100%;
            height: 100%;
            padding: 42px 86px 36px 134px;
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            min-width: 0;
            padding-top: 10px;
        }

        .stat-item {
            display: grid;
            grid-template-columns: 86px 1fr;
            align-items: center;
            width: 460px;
            height: 72px;
        }

        .stat-icon {
            width: 64px;
            height: 64px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 0 rgba(0, 0, 0, 0.34));
        }

        .stat-text {
            font-size: 60px;
            line-height: 1;
            color: #f7fafc;
            text-shadow: 0 4px 0 rgba(0, 0, 0, 0.42);
            white-space: nowrap;
        }

        .player-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 0;
            padding-top: 4px;
        }

        .player-meta {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 54px;
            margin-bottom: 14px;
        }

        .username {
            max-width: 360px;
            overflow: hidden;
            color: #ffffff;
            font-size: 38px;
            line-height: 1.15;
            text-align: center;
            text-overflow: ellipsis;
            text-shadow: 0 4px 0 rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        .skin-container {
            width: 318px;
            height: 486px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .skin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: auto;
            filter: drop-shadow(0 14px 0 rgba(0, 0, 0, 0.34));
        }

        .update-time {
            grid-column: 1 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 26px;
            line-height: 1;
            text-shadow: 0 3px 0 rgba(0, 0, 0, 0.42);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ background_uri | safe }}" alt="背景" class="background">
        <div class="shade"></div>
        <div class="content">
            <div class="stats-panel">
                <div class="stat-item">
                    <img src="{{ icons.nether | safe }}" alt="下界" class="stat-icon">
                    <span class="stat-text">{{ times.nether }}</span>
                </div>
                <div class="stat-item">
                    <img src="{{ icons.bastion | safe }}" alt="堡垒遗迹" class="stat-icon">
                    <span class="stat-text">{{ times.bastion }}</span>
                </div>
                <div class="stat-item">
                    <img src="{{ icons.fortress | safe }}" alt="下界要塞" class="stat-icon">
                    <span class="stat-text">{{ times.fortress }}</span>
                </div>
                <div class="stat-item">
                    <img src="{{ icons.first_portal | safe }}" alt="第一个传送门" class="stat-icon">
                    <span class="stat-text">{{ times.first_portal }}</span>
                </div>
                <div class="stat-item">
                    <img src="{{ icons.stronghold | safe }}" alt="要塞" class="stat-icon">
                    <span class="stat-text">{{ times.stronghold }}</span>
                </div>
                <div class="stat-item">
                    <img src="{{ icons.end | safe }}" alt="末地" class="stat-icon">
                    <span class="stat-text">{{ times.end }}</span>
                </div>
                <div class="stat-item">
                    <img src="{{ icons.finish | safe }}" alt="完成" class="stat-icon">
                    <span class="stat-text">{{ times.finish }}</span>
                </div>
            </div>

            <div class="player-panel">
                <div class="player-meta">
                    <div class="username">{{ uname }}</div>
                </div>
                <div class="skin-container">
                    {% if skin_uri %}
                    <img src="{{ skin_uri | safe }}" alt="{{ uname }}的皮肤" class="skin-image">
                    {% endif %}
                </div>
            </div>

            <div class="update-time">{{ update_time }}</div>
        </div>
    </div>
</body>
</html>
